services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend/data:/app/data
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    networks:
      - app

networks:
  app:

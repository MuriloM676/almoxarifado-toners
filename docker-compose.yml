services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-almox_secret_troque_em_producao}
    volumes:
      - db_data:/app/data
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app

volumes:
  db_data:

networks:
  app:

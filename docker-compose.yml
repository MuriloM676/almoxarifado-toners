services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - db_data:/app
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app

volumes:
  db_data:

networks:
  app:
